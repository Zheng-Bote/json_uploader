name: C++ Quality & Security

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          version="${{ steps.version.outputs.version }}"

          echo "=== Collecting release assets for version: $version ==="
          echo ""

          # Copy build artifacts
          echo "=== Build Artifacts ==="
          if [ -d "build" ]; then
            # Copy build-static if it exists (legacy)
            if [ -d "build/build-static" ]; then
              cp -r build/build-static release-assets/
              echo "✓ Copied build/build-static/"
            fi
            
            # Copy build folder but exclude large directories
            if [ -d "build" ]; then
              echo "Copying build directory..."
              mkdir -p release-assets/build
              
              # Copy all files
              find build -type f -exec cp {} release-assets/build/ \;
              
              # Remove .vscode directory if present
              if [ -d "release-assets/build/.vscode" ]; then
                rm -rf release-assets/build/.vscode
                echo "✓ Removed .vscode directory"
              fi
              
              echo "✓ Copied build/ directory"
            fi
          else
            echo "⚠️  build/ directory not found"
          fi

          echo ""
          echo "=== Additional Files ==="
          # Copy CHANGELOG
          if [ -f "CHANGELOG.md" ]; then
            cp CHANGELOG.md release-assets/
            echo "✓ Copied CHANGELOG.md"
          else
            echo "⚠️  CHANGELOG.md not found"
          fi

          echo ""
          echo "=== Release Assets Summary ==="
          ls -lah release-assets/
          echo ""
          echo "Total files: $(ls release-assets/ | wc -l)"

      - name: Extract Release Notes from CHANGELOG
        run: |
          version="${{ steps.version.outputs.version }}"
          echo "Extracting release notes for version: $version"

          if [ -f "CHANGELOG.md" ]; then
            # Extract section between version header and next header or end
            sed -n "/^## \[$version\]/,/^## \[/p" CHANGELOG.md | sed '$ d' > release_notes.txt
            
            # If file is empty or doesn't contain the version, create a default
            if [ ! -s release_notes.txt ]; then
              echo "## Release v$version" > release_notes.txt
              echo "" >> release_notes.txt
              echo "See CHANGELOG.md for details." >> release_notes.txt
            fi
          else
            echo "## Release v$version" > release_notes.txt
            echo "" >> release_notes.txt
            echo "No CHANGELOG.md found." >> release_notes.txt
          fi

          echo ""
          echo "=== Release Notes Preview ==="
          cat release_notes.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release v${{ steps.version.outputs.version }}"
          body_path: release_notes.txt
          draft: false
          prerelease: false
          files: |
            release-assets/CHANGELOG.md
