name: C++ Quality & Security

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          version="${{ steps.version.outputs.version }}"

          echo "=== Collecting release assets for version: $version ==="

          if [ -d "build" ]; then
            echo "Copying build directory (preserving structure)..."
            mkdir -p release-assets/build
            # Use rsync to preserve structure and exclude common large/irrelevant dirs
            rsync -a --exclude='.vscode' --exclude='node_modules' --exclude='*.o' build/ release-assets/build/
            echo "✓ Copied build/ directory to release-assets/build/"
          else
            echo "⚠️  build/ directory not found"
          fi

          echo ""
          echo "=== Additional Files ==="
          if [ -f "CHANGELOG.md" ]; then
            cp CHANGELOG.md release-assets/
            echo "✓ Copied CHANGELOG.md"
          else
            echo "⚠️  CHANGELOG.md not found"
          fi

          echo ""
          echo "=== Release Assets Summary ==="
          find release-assets -maxdepth 2 -type f -print | sed -e 's/^/ - /'
          echo ""
          echo "Total files: $(find release-assets -type f | wc -l)"

      - name: Extract Release Notes from CHANGELOG
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          echo "Extracting release notes for version: $version"

          if [ -f "CHANGELOG.md" ]; then
            # Extract section starting at a header that contains the version (supports [v1.2.3], v1.2.3, 1.2.3)
            awk -v ver="$version" '
              BEGIN {found=0}
              /^##[[:space:]]/ {
                if (found) exit
                header = $0
                if (index(header, ver) > 0) { found=1; print header; next }
              }
              found { print }
            ' CHANGELOG.md > release_notes.txt

            if [ ! -s release_notes.txt ]; then
              echo "## Release v$version" > release_notes.txt
              echo "" >> release_notes.txt
              echo "See CHANGELOG.md for details." >> release_notes.txt
            fi
          else
            echo "## Release v$version" > release_notes.txt
            echo "" >> release_notes.txt
            echo "No CHANGELOG.md found." >> release_notes.txt
          fi

          echo ""
          echo "=== Release Notes Preview ==="
          sed -n '1,200p' release_notes.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release v${{ steps.version.outputs.version }}"
          body_path: release_notes.txt
          draft: false
          prerelease: false
          files: |
            release-assets/*
